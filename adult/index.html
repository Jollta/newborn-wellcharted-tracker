<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Health Confidence Tracker · WellCharted.health</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy:#2d4a8a; --navy-dk:#1e3366; --navy-lt:#e8edf8;
    --amber:#f0a500; --amber-lt:#fff8e6;
    --rose:#e05c5c; --rose-lt:#fdf0f0;
    --green:#3a9e7e; --green-lt:#edf8f4;
    --slate:#6b7a99; --bg:#f4f5f8; --card:#ffffff;
    --text:#1e2a3b; --muted:#9ba8c0; --border:#dde2ef;
    --radius:12px; --shadow:0 2px 12px rgba(45,74,138,.08);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}

  /* DISCLAIMER */
  .disc{background:#fff8e6;border-bottom:2px solid var(--amber);padding:10px 16px;display:flex;align-items:flex-start;gap:10px;font-size:.8rem;color:#7a5800}
  .disc strong{display:block;font-size:.83rem;margin-bottom:2px}
  .disc-x{margin-left:auto;background:none;border:none;cursor:pointer;font-size:1.2rem;color:#b37800;flex-shrink:0;padding:2px 6px}

  /* HEADER */
  header{background:linear-gradient(135deg,var(--navy-dk),var(--navy));color:#fff;padding:12px 16px;position:sticky;top:0;z-index:1000;box-shadow:0 4px 24px rgba(30,51,102,.25)}
  .hdr-row{display:flex;align-items:center;gap:10px}
  .brand h1{font-family:'Lora',serif;font-size:1.1rem;font-weight:600;line-height:1.2;flex:1}
  .brand p{font-size:.65rem;opacity:.6;text-transform:uppercase;letter-spacing:.4px}
  .print-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 10px;font-size:.72rem;color:#fff;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0}

  /* MENU TOGGLE — always visible, styled as pill button */
  .menu-toggle{background:var(--amber);border:none;border-radius:20px;color:var(--navy-dk);padding:7px 14px;font-size:.82rem;font-weight:700;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}

  /* NAV DRAWER — hidden by default, shown when .open */
  .nav-drawer{display:none;flex-direction:column;padding:8px 12px 14px;gap:4px;background:var(--navy-dk);border-top:1px solid rgba(255,255,255,.1)}
  .nav-drawer.open{display:flex}
  .nav-tab{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:10px;background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.85);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;text-align:left;width:100%;transition:background .15s;-webkit-tap-highlight-color:transparent}
  .nav-tab:hover,.nav-tab:active{background:rgba(255,255,255,.15)}
  .nav-tab.active{background:rgba(255,255,255,.2);color:#fff;font-weight:700;border-left:3px solid var(--amber)}
  .nav-tab-icon{font-size:1.1rem;width:24px;flex-shrink:0}

  /* CURRENT TAB INDICATOR — shows what tab is active */
  .current-tab-bar{background:var(--navy);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--amber)}
  .current-tab-label{color:#fff;font-size:.88rem;font-weight:600}
  .current-tab-hint{color:rgba(255,255,255,.5);font-size:.72rem}

  /* MAIN */
  main{max-width:1220px;margin:0 auto;padding:18px 14px 80px}
  .panel{display:none;animation:fadeIn .22s ease}
  .panel.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

  .sec-title{font-family:'Lora',serif;font-size:1.2rem;font-weight:600;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:10px}
  .sec-sub{color:var(--slate);font-size:.85rem;margin-bottom:18px}

  /* CARD */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:18px;overflow:hidden}
  .card-head{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .card-head h3{font-family:'Lora',serif;font-size:.95rem;font-weight:600;color:var(--navy)}
  .card-hint{font-size:.72rem;color:var(--muted)}

  /* TABLE */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;min-width:480px}
  th{background:var(--navy-lt);color:var(--navy);font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;padding:9px 11px;text-align:left}
  td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:.84rem}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--navy-lt)}
  .q-label{font-family:'Lora',serif;font-weight:600;color:var(--navy);font-size:.88rem}

  /* BADGES */
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
  .b-amber{background:var(--amber-lt);color:#b37800}
  .b-green{background:var(--green-lt);color:#2a7a5e}
  .b-rose{background:var(--rose-lt);color:#c04040}
  .b-slate{background:var(--navy-lt);color:var(--slate)}
  .b-purple{background:#f0ecff;color:#5c3dac}

  .ssel{border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:.77rem;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);cursor:pointer}

  .editable{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.84rem;color:var(--text);width:100%;outline:none;border-bottom:1px dashed transparent;transition:border-color .2s}
  .editable:focus{border-bottom-color:var(--navy);background:var(--navy-lt);border-radius:4px;padding:2px 5px}
  .mu{color:var(--muted);font-style:italic}

  /* BUTTONS */
  .add-row{display:flex;gap:10px;padding:12px 14px;background:var(--bg);border-top:1px solid var(--border);flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:500;cursor:pointer;border:none;transition:all .18s;text-decoration:none;-webkit-tap-highlight-color:transparent}
  .btn-p{background:var(--navy);color:#fff}
  .btn-p:hover,.btn-p:active{background:var(--navy-dk)}
  .btn-o{background:var(--card);color:var(--navy);border:1.5px solid var(--navy)}
  .btn-o:hover{background:var(--navy-lt)}
  .btn-g{background:var(--green);color:#fff}
  .btn-sm{padding:6px 12px;font-size:.76rem}
  .del-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;border-radius:6px;font-size:1rem;-webkit-tap-highlight-color:transparent}
  .del-btn:hover,.del-btn:active{color:var(--rose);background:var(--rose-lt)}

  /* GRID */
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:640px){.g2{grid-template-columns:1fr}}

  /* READINGS */
  .rc{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:13px 14px;box-shadow:var(--shadow);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .rc-big{font-family:'Lora',serif;font-size:1.4rem;font-weight:600;color:var(--navy)}
  .rc-lbl{font-size:.72rem;color:var(--slate);text-transform:uppercase;letter-spacing:.5px}
  .rc-meta{font-size:.77rem;color:var(--muted)}

  /* QUESTION CARDS */
  .qcard{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
  .qtop{display:flex;align-items:flex-start;gap:10px}
  .qnum{background:var(--navy);color:#fff;font-family:'Lora',serif;font-size:1rem;font-weight:600;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
  .qbody{flex:1;min-width:0}
  .qinput{width:100%;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.93rem;color:var(--text);resize:none;outline:none;min-height:44px;border-bottom:1.5px solid var(--border);padding-bottom:4px}
  .qinput:focus{border-bottom-color:var(--navy)}
  .qmeta{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .qplan{flex:1;min-width:180px;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:.84rem;color:var(--text);background:var(--bg);outline:none}
  .qplan:focus{border-color:var(--navy)}

  /* PATIENT BAR */
  .pt-bar{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);flex-wrap:wrap}
  .pt-bar label{font-size:.74rem;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  .pt-bar input{border:none;background:transparent;font-family:'Lora',serif;font-size:.93rem;color:var(--navy);outline:none;border-bottom:1.5px solid var(--border);padding-bottom:2px;min-width:140px}
  .pt-bar input:focus{border-bottom-color:var(--navy)}
  .pt-bar .appt-in{width:140px;min-width:unset;font-family:'DM Sans',sans-serif;font-size:.86rem}

  /* URGENT */
  .uc-ban{background:linear-gradient(90deg,var(--rose),#c94040);color:#fff;border-radius:var(--radius);padding:13px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}

  /* REF CARDS */
  .rfc{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:13px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
  .rfi{font-size:1.3rem;margin-top:2px}
  .spc{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:13px 14px;margin-bottom:10px}

  /* REFERRAL ALERT */
  .ref-alert{background:var(--amber-lt);border:1.5px solid var(--amber);border-radius:var(--radius);padding:13px 14px;margin-top:14px;font-size:.82rem;color:#7a5800;line-height:1.6}
  .ref-alert strong{display:block;margin-bottom:4px}

  /* SCREENING */
  .scr-ref{background:var(--navy-lt);border-radius:var(--radius);padding:13px 14px;margin-bottom:14px}
  .scr-ref h4{font-family:'Lora',serif;color:var(--navy);font-size:.9rem;margin-bottom:8px}
  .scr-list{display:grid;grid-template-columns:1fr 1fr;gap:3px 14px;list-style:none}
  .scr-list li{font-size:.78rem;color:var(--slate);padding-left:14px;position:relative}
  .scr-list li::before{content:'✓';position:absolute;left:0;color:var(--green);font-weight:700}
  @media(max-width:500px){.scr-list{grid-template-columns:1fr}}

  /* INLINE FORM */
  .if-wrap .form-group{margin-bottom:11px}
  .if-wrap label{display:block;font-size:.74rem;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .if-wrap input,.if-wrap select,.if-wrap textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);background:var(--bg);outline:none}
  .if-wrap input:focus,.if-wrap select:focus,.if-wrap textarea:focus{border-color:var(--navy);background:#fff}
  .if-wrap textarea{resize:vertical;min-height:64px}

  /* MODAL */
  .mo{display:none;position:fixed;inset:0;background:rgba(30,42,59,.5);z-index:2000;align-items:center;justify-content:center;padding:14px}
  .mo.open{display:flex}
  .mi{background:var(--card);border-radius:16px;padding:20px 18px;width:min(500px,100%);box-shadow:0 12px 40px rgba(30,42,59,.25);animation:fadeIn .2s ease;max-height:90vh;overflow-y:auto}
  .mi h3{font-family:'Lora',serif;font-size:1.05rem;color:var(--navy);margin-bottom:3px}
  .mi .msub{font-size:.77rem;color:var(--muted);margin-bottom:13px}
  .mi .form-group{margin-bottom:11px}
  .mi .form-group label{display:block;font-size:.74rem;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .mi .form-group input,.mi .form-group select,.mi .form-group textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);background:var(--bg);outline:none}
  .mi .form-group input:focus,.mi .form-group select:focus,.mi .form-group textarea:focus{border-color:var(--navy);background:#fff}
  .mi .form-group textarea{resize:vertical;min-height:64px}
  .mact{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}

  /* PRINT */
  @media print{
    header,.disc,.add-row,.del-btn,.print-btn,.btn-p,.btn-o,.btn-g,.btn-sm,
    .qmeta-btns,.no-print,.menu-toggle,.nav-drawer,.current-tab-bar{display:none!important}
    .panel{display:none!important}
    .panel.active{display:block!important}
    .card,.rc,.qcard,.rfc{box-shadow:none!important;border:1px solid #ccc!important}
    main{padding:10px!important}
  }
</style>
</head>
<body>

<!-- DISCLAIMER -->
<div class="disc" id="disc">
  <span style="font-size:1.1rem;flex-shrink:0">⚠️</span>
  <div>
    <strong>Educational &amp; Tracking Tool Only</strong>
    For personal health organization and communication with your care team. Does not replace the advice of a licensed healthcare provider.
  </div>
  <button class="disc-x" onclick="document.getElementById('disc').style.display='none'">✕</button>
</div>

<!-- HEADER -->
<header>
  <div class="hdr-row">
    <div class="brand" style="flex:1;min-width:0">
      <h1>Health Confidence Tracker</h1>
      <p>WellCharted.health</p>
    </div>
    <button class="print-btn" onclick="window.print()">🖨 Print</button>
    <button class="menu-toggle" id="menu-toggle" onclick="toggleNav()">☰ Menu</button>
  </div>

  <!-- VERTICAL NAV DRAWER -->
  <div class="nav-drawer" id="nav-drawer"></div>
</header>

<!-- CURRENT TAB INDICATOR -->
<div class="current-tab-bar" id="current-tab-bar">
  <span class="current-tab-label" id="current-tab-label">📅 PCP Visits</span>
  <span class="current-tab-hint">Tap Menu to switch tabs</span>
</div>

<main id="main"></main>
<div class="mo" id="modal"><div class="mi" id="modal-inner"></div></div>

<script>
const TABS=[
  {id:'pcp',icon:'📅',label:'PCP Visits'},
  {id:'questions',icon:'❓',label:'Top 3 Questions'},
  {id:'history',icon:'📋',label:'Health History'},
  {id:'urgent',icon:'🚨',label:'Urgent Care'},
  {id:'bp',icon:'❤️',label:'Blood Pressure'},
  {id:'bs',icon:'🩸',label:'Blood Sugar'},
  {id:'meds',icon:'💊',label:'Medications'},
  {id:'referrals',icon:'🔗',label:'Referrals'},
  {id:'specialist',icon:'👨‍⚕️',label:'Specialist F/U'},
  {id:'screening',icon:'🛡️',label:'Preventative Screening'},
  {id:'vision',icon:'👁️',label:'Vision & Hearing'},
  {id:'contacts',icon:'📞',label:'Contacts & Insurance'},
  {id:'upcoming',icon:'📆',label:'Upcoming Appointments'},
  {id:'labs',icon:'🔬',label:'Lab Results'},
  {id:'vaccines',icon:'💉',label:'Vaccines & Immunizations'},
];

function load(k,d){try{const v=localStorage.getItem('hct_'+k);return v?JSON.parse(v):d}catch{return d}}
function save(k,v){localStorage.setItem('hct_'+k,JSON.stringify(v))}

const S={
  pcp_routine:load('pcp_routine',[
    {id:1,quarter:'Q1 2026',months:'Jan – Mar',date:'',notes:'',pcp:'',status:'Scheduled'},
    {id:2,quarter:'Q2 2026',months:'Apr – Jun',date:'',notes:'',pcp:'',status:'Scheduled'},
    {id:3,quarter:'Q3 2026',months:'Jul – Sep',date:'',notes:'',pcp:'',status:'Scheduled'},
    {id:4,quarter:'Q4 2026',months:'Oct – Dec',date:'',notes:'',pcp:'',status:'Scheduled'},
  ]),
  pcp_sick:load('pcp_sick',[]),
  questions:load('questions',[{text:'',plan:'',status:'open'},{text:'',plan:'',status:'open'},{text:'',plan:'',status:'open'}]),
  pt_name:load('pt_name',''),appt_date:load('appt_date',''),
  history:load('history',[]),urgent:load('urgent',[]),bp:load('bp',[]),bs:load('bs',[]),
  meds:load('meds',[]),referrals:load('referrals',[]),specialist:load('specialist',[]),
  screening:load('screening',[]),vision:load('vision',[]),hearing:load('hearing',[]),
  emcontacts:load('emcontacts',[]),pharmacy:load('pharmacy',[]),insurance:load('insurance',[]),
  labs:load('labs',[]),vaccines:load('vaccines',[]),
};

let activeTab='pcp', vhForm='vision', ciForm='contact';
let navOpen=false;

function uid(){return Date.now()+Math.random().toString(36).slice(2,6)}
function gv(id){const e=document.getElementById(id);return e?e.value.trim():''}
function gtv(id){const e=document.getElementById(id);return e?e.value:''}

function toggleNav(){
  navOpen=!navOpen;
  const drawer=document.getElementById('nav-drawer');
  const btn=document.getElementById('menu-toggle');
  if(navOpen){
    drawer.classList.add('open');
    btn.textContent='✕ Close';
  } else {
    drawer.classList.remove('open');
    btn.textContent='☰ Menu';
  }
}

function closeNav(){
  navOpen=false;
  document.getElementById('nav-drawer').classList.remove('open');
  document.getElementById('menu-toggle').textContent='☰ Menu';
}

function buildNav(){
  document.getElementById('nav-drawer').innerHTML=TABS.map(t=>
    `<button class="nav-tab${t.id===activeTab?' active':''}" onclick="sw('${t.id}')">
      <span class="nav-tab-icon">${t.icon}</span> ${t.label}
    </button>`
  ).join('');
  // Update current tab label
  const cur=TABS.find(t=>t.id===activeTab);
  if(cur) document.getElementById('current-tab-label').textContent=`${cur.icon} ${cur.label}`;
}

function sw(id){
  activeTab=id;
  buildNav();
  render();
  closeNav();
  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const rs={pcp:rPCP,questions:rQ,history:rHist,urgent:rUC,bp:rBP,bs:rBS,meds:rMeds,
    referrals:rRef,specialist:rSpec,screening:rScr,vision:rVis,contacts:rCon,
    upcoming:rUpcoming,labs:rLabs,vaccines:rVax};
  document.getElementById('main').innerHTML=`<div class="panel active">${(rs[activeTab]||rPCP)()}</div>`;
}

function sbadge(s){
  const m={'Completed':'b-green','Complete':'b-green','Reviewed with PCP':'b-green',
    'Pending':'b-amber','Scheduled':'b-amber','Open':'b-amber',
    'Cancelled':'b-rose','Missed':'b-rose','No entry':'b-slate','In Progress':'b-slate'};
  return `<span class="badge ${m[s]||'b-slate'}">${s||'—'}</span>`;
}
function ssel(val,fn,opts){
  const o=opts||['Scheduled','Completed','Pending','Cancelled','Missed','In Progress','No entry'];
  return `<select class="ssel" onchange="(${fn})(this.value)">${o.map(x=>`<option${x===val?' selected':''}>${x}</option>`).join('')}</select>`;
}

/* ══ PCP ══ */
function rPCP(){
  const rows=S.pcp_routine.map((r,i)=>`<tr>
    <td><span class="q-label">${r.quarter}</span></td><td>${r.months}</td>
    <td>${r.date?`<strong>${r.date}</strong>`:`<span class="mu">—</span>`}</td>
    <td>${r.notes||`<span class="mu">—</span>`}</td>
    <td>${r.pcp||`<span class="mu">—</span>`}</td>
    <td><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
      ${ssel(r.status,`function(v){S.pcp_routine[${i}].status=v;save('pcp_routine',S.pcp_routine)}`)}
      <button class="btn btn-o btn-sm" onclick="openRoutineModal(${i})">✏️</button>
    </div></td></tr>`).join('');
  const sick=S.pcp_sick.map((r,i)=>`<tr>
    <td><span class="badge b-amber">${r.type}</span></td><td>${r.date}</td><td>${r.notes||'—'}</td>
    <td>${ssel(r.status,`function(v){S.pcp_sick[${i}].status=v;save('pcp_sick',S.pcp_sick)}`)}</td>
    <td><button class="del-btn" onclick="delSick(${i})">🗑</button></td></tr>`).join('');
  return `<div class="sec-title">📅 PCP Visits</div>
    <p class="sec-sub">Track quarterly check-ups and sick/acute visits.</p>
    <div class="card">
      <div class="card-head"><h3>Quarterly Routine Follow-Ups</h3></div>
      <div class="tbl-wrap"><table><thead><tr><th>Quarter</th><th>Months</th><th>Date</th><th>Notes</th><th>PCP</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    </div>
    <div class="card">
      <div class="card-head"><h3>Sick / Acute Visits</h3></div>
      <div class="tbl-wrap"><table><thead><tr><th>Type</th><th>Date</th><th>Reason</th><th>Status</th><th></th></tr></thead>
      <tbody>${sick||`<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px">No sick visits logged yet.</td></tr>`}</tbody></table></div>

/* ══ BLOOD PRESSURE ══ */
function rBP(){
  const cards=S.bp.slice().reverse().map((r,i)=>{
    const ri=S.bp.length-1-i;
    const[sys,dia]=r.reading.split('/').map(Number);
    let f='b-green',l='Normal';
    if(sys>=130||dia>=80){f='b-amber';l='Elevated';}
    if(sys>=140||dia>=90){f='b-rose';l='High';}
    return `<div class="rc"><div><div class="rc-lbl">Blood Pressure</div>
      <div class="rc-big">${r.reading} <small style="font-size:.82rem">mmHg</small></div>
      <div class="rc-meta">${r.date}${r.time?' · '+r.time:''}${r.arm?' · '+r.arm:''}</div></div>
      <div style="text-align:right"><span class="badge ${f}">${l}</span>
      <div style="margin-top:6px"><button class="del-btn" onclick="delBP(${ri})">🗑</button></div></div></div>`;
  }).join('')||`<p style="color:var(--muted);padding:16px">No readings yet.</p>`;
  return `<div class="sec-title">❤️ Blood Pressure Log</div><p class="sec-sub">Normal: below 120/80 mmHg.</p>
    <div class="g2"><div>${cards}</div>
    <div class="card" style="padding:16px">
      <h3 style="font-family:Lora,serif;color:var(--navy);margin-bottom:13px">Add Reading</h3>
      <div class="if-wrap">
        <div class="form-group"><label>Reading (Sys/Dia)</label><input id="bp_r" placeholder="120/80" /></div>
        <div class="form-group"><label>Date</label><input id="bp_d" type="date" /></div>
        <div class="form-group"><label>Time</label><input id="bp_t" type="time" /></div>
        <div class="form-group"><label>Arm</label><select id="bp_a"><option>Left</option><option>Right</option></select></div>
        <button class="btn btn-p" style="width:100%;justify-content:center" onclick="addBP()">Add Reading</button>
      </div>
    </div></div>`;
}
window.addBP=()=>{const r=gv('bp_r'),d=gv('bp_d');if(!r||!d){alert('Please enter a reading and date.');return;}S.bp.push({reading:r,date:d,time:gv('bp_t'),arm:gv('bp_a')});save('bp',S.bp);render()};
window.delBP=(i)=>{S.bp.splice(i,1);save('bp',S.bp);render()};

    <div style="font-size:.8rem;color:var(--slate)">Member ID: ${x.memberId||'—'} · Group: ${x.group||'—'}</div></div>
    <button class="del-btn" onclick="delIns(${i})">🗑</button></div>`).join('')||`<p style="color:var(--muted);padding:12px">No insurance information saved yet.</p>`;
  const t3=[['contact','+ Emergency Contact'],['pharmacy','+ Pharmacy'],['insurance','+ Insurance']];
  const tb=t3.map(([id,lb])=>`<button onclick="ciForm='${id}';render()" style="flex:1;padding:11px 4px;border:none;background:${ciForm===id?'var(--navy-lt)':'var(--card)'};color:${ciForm===id?'var(--navy)':'var(--slate)'};font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:${ciForm===id?'600':'400'};cursor:pointer;border-right:1px solid var(--border)">${lb}</button>`).join('');
  let fh='';
  if(ciForm==='contact') fh=`<div class="if-wrap"><div class="form-group"><label>Name</label><input id="ci_n" placeholder="Contact Name" /></div><div class="form-group"><label>Phone / Email</label><input id="ci_ph" placeholder="(555) 123-4567" /></div><div class="form-group"><label>Relationship</label><input id="ci_r" placeholder="e.g., Spouse, Daughter" /></div><button class="btn btn-p" style="width:100%;justify-content:center" onclick="addEM()">Save Contact</button></div>`;
  else if(ciForm==='pharmacy') fh=`<div class="if-wrap"><div class="form-group"><label>Pharmacy Name</label><input id="ci_n" placeholder="e.g., CVS, Walgreens" /></div><div class="form-group"><label>Phone</label><input id="ci_ph" placeholder="(555) 123-4567" /></div><div class="form-group"><label>Address</label><input id="ci_a" placeholder="123 Main St" /></div><button class="btn btn-p" style="width:100%;justify-content:center" onclick="addPh()">Save Pharmacy</button></div>`;
  else fh=`<div class="if-wrap"><div class="form-group"><label>Insurance Carrier</label><input id="ci_c" placeholder="e.g., BlueCross, Medicare" /></div><div class="form-group"><label>Type</label><select id="ci_ty"><option>Medical</option><option>Dental</option><option>Vision</option><option>Medicare</option><option>Medicaid</option><option>Other</option></select></div><div class="form-group"><label>Member ID</label><input id="ci_m" placeholder="Member ID" /></div><div class="form-group"><label>Group Number</label><input id="ci_g" placeholder="Group number" /></div><div class="form-group"><label>Member Services Phone</label><input id="ci_ph" placeholder="Number on back of card" /></div><button class="btn btn-p" style="width:100%;justify-content:center" onclick="addIns()">Save Insurance</button></div>`;
  return `<div class="sec-title">📞 Contacts & Insurance</div><p class="sec-sub">Emergency contacts, pharmacy, and insurance in one place.</p>
    <h3 style="font-family:Lora,serif;color:var(--navy);font-size:.95rem;margin-bottom:9px">Emergency Contacts</h3>${emc}
    <h3 style="font-family:Lora,serif;color:var(--navy);font-size:.95rem;margin:14px 0 9px">Pharmacy</h3>${phc}
    <h3 style="font-family:Lora,serif;color:var(--navy);font-size:.95rem;margin:14px 0 9px">Insurance & ID</h3>${inc}
    <div class="card" style="margin-top:12px;overflow:hidden">
      <div style="display:flex;border-bottom:1px solid var(--border)">${tb}</div>
      <div style="padding:14px">${fh}</div>
    </div>`;
}
window.addEM=()=>{const n=gv('ci_n');if(!n){alert('Please enter a name.');return;}S.emcontacts.push({id:uid(),name:n,phone:gv('ci_ph'),rel:gv('ci_r')});save('emcontacts',S.emcontacts);render()};
window.addPh=()=>{const n=gv('ci_n');if(!n){alert('Please enter a pharmacy name.');return;}S.pharmacy.push({id:uid(),name:n,phone:gv('ci_ph'),address:gv('ci_a')});save('pharmacy',S.pharmacy);render()};
window.addIns=()=>{const c=gv('ci_c');if(!c){alert('Please enter a carrier name.');return;}S.insurance.push({id:uid(),carrier:c,type:gv('ci_ty'),memberId:gv('ci_m'),group:gv('ci_g'),phone:gv('ci_ph')});save('insurance',S.insurance);render()};
window.delEM=(i)=>{S.emcontacts.splice(i,1);save('emcontacts',S.emcontacts);render()};
window.delPh=(i)=>{S.pharmacy.splice(i,1);save('pharmacy',S.pharmacy);render()};
window.delIns=(i)=>{S.insurance.splice(i,1);save('insurance',S.insurance);render()};

/* ══ MODAL CONFIGS ══ */
const MODS={
  sick:{title:'Add Sick / Acute Visit',fields:[{id:'type',label:'Visit Type',type:'select',opts:['Acute Visit','Sick Visit','Telehealth','ER Visit']},{id:'date',label:'Date',type:'date'},{id:'notes',label:'Reason / Notes',type:'text'},{id:'status',label:'Status',type:'select',opts:['Pending','Completed','Cancelled']}],save(d){S.pcp_sick.push({id:uid(),...d});save('pcp_sick',S.pcp_sick)}},
  history:{title:'Add Health History Entry',fields:[{id:'year',label:'Year',type:'text',placeholder:'2024'},{id:'condition',label:'Condition / Event',type:'text'},{id:'treatment',label:'Treatment',type:'text'},{id:'provider',label:'Provider / Facility',type:'text'}],save(d){S.history.push({id:uid(),...d});save('history',S.history)}},
  urgent:{title:'Log Urgent Care Visit',fields:[{id:'date',label:'Date',type:'date'},{id:'facility',label:'Facility Name',type:'text'},{id:'reason',label:'Reason',type:'text'},{id:'outcome',label:'Outcome / Follow-up',type:'text'},{id:'status',label:'Status',type:'select',opts:['Pending','Completed','In Progress']}],save(d){S.urgent.push({id:uid(),...d});save('urgent',S.urgent)}},
  med:{title:'Add Medication',fields:[{id:'name',label:'Medication Name',type:'text'},{id:'dose',label:'Dosage',type:'text',placeholder:'10mg'},{id:'freq',label:'Frequency',type:'text',placeholder:'Once daily'},{id:'prescriber',label:'Prescribing Doctor',type:'text'},{id:'start',label:'Start Date',type:'date'},{id:'status',label:'Status',type:'select',opts:['Active','On Hold','Discontinued']}],save(d){S.meds.push({id:uid(),...d});save('meds',S.meds)}},
  referral:{title:'Add Referral',fields:[{id:'specialist',label:'Specialty / Type',type:'text',placeholder:'e.g., Cardiology'},{id:'specialistName',label:'Specialist Name (if known)',type:'text'},{id:'facility',label:'Facility / Practice',type:'text'},{id:'referredBy',label:'Referred By',type:'text'},{id:'date',label:'Referral Date',type:'date'},{id:'status',label:'Status',type:'select',opts:['Pending','Scheduled','Completed','Cancelled']}],save(d){S.referrals.push({id:uid(),...d});save('referrals',S.referrals)}},
  specialist:{title:'Add Specialist',fields:[{id:'name',label:'Specialist Name',type:'text'},{id:'specialty',label:'Specialty',type:'text'},{id:'facility',label:'Facility / Practice',type:'text'},{id:'nextDate',label:'Next Appointment',type:'date'},{id:'status',label:'Status',type:'select',opts:['Active','Scheduled','Completed','On Hold']},{id:'notes',label:'Notes',type:'textarea'}],save(d){S.specialist.push({id:uid(),...d});save('specialist',S.specialist)}}
};
window.openM=function(type){
  const cfg=MODS[type];if(!cfg)return;
  const f=cfg.fields.map(f=>{let i;if(f.type==='select')i=`<select id="mf_${f.id}">${f.opts.map(o=>`<option>${o}</option>`).join('')}</select>`;else if(f.type==='textarea')i=`<textarea id="mf_${f.id}" placeholder="${f.placeholder||''}"></textarea>`;else i=`<input id="mf_${f.id}" type="${f.type}" placeholder="${f.placeholder||''}" />`;return `<div class="form-group"><label>${f.label}</label>${i}</div>`;}).join('');
  document.getElementById('modal-inner').innerHTML=`<h3>${cfg.title}</h3>${f}<div class="mact"><button class="btn btn-o" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="subM('${type}')">Save</button></div>`;
  document.getElementById('modal').classList.add('open');
};
window.subM=function(type){const cfg=MODS[type];const d={};cfg.fields.forEach(f=>{d[f.id]=gv('mf_'+f.id)});cfg.save(d);closeM();render();};
window.closeM=()=>document.getElementById('modal').classList.remove('open');
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeM()});

/* ══ UPCOMING ══ */
function rUpcoming(){
  const now=new Date();now.setHours(0,0,0,0);const all=[];
  S.pcp_routine.forEach(r=>{if(r.date){const d=new Date(r.date+'T00:00:00');all.push({date:r.date,_d:d,type:'PCP Routine',label:r.quarter,provider:r.pcp||'—',status:r.status});}});
  S.pcp_sick.forEach(r=>{if(r.date){const d=new Date(r.date+'T00:00:00');all.push({date:r.date,_d:d,type:r.type,label:r.type,provider:'—',status:r.status});}});
  S.specialist.forEach(r=>{if(r.nextDate){const d=new Date(r.nextDate+'T00:00:00');all.push({date:r.nextDate,_d:d,type:'Specialist',label:r.specialty||r.name,provider:r.name,status:r.status});}});
  all.sort((a,b)=>a._d-b._d);
  const upcoming=all.filter(a=>a._d>=now);
  const past=all.filter(a=>a._d<now).reverse().slice(0,5);
  const tc={'PCP Routine':'b-green','Acute Visit':'b-amber','Sick Visit':'b-amber','Telehealth':'b-slate','ER Visit':'b-rose','Specialist':'b-purple'};
  function apptCard(a,isPast){
    const diff=Math.round((a._d-now)/(1000*60*60*24));
    let countdown='';
    if(!isPast){if(diff===0)countdown=`<span class="badge b-rose">TODAY</span>`;else if(diff===1)countdown=`<span class="badge b-amber">TOMORROW</span>`;else if(diff<=7)countdown=`<span class="badge b-amber">In ${diff} days</span>`;}
    return `<div class="rfc" style="${isPast?'opacity:.7':''}">
      <div style="min-width:44px;text-align:center;flex-shrink:0">
        <div style="font-family:Lora,serif;font-size:1.2rem;font-weight:600;color:var(--navy);line-height:1">${a._d.getDate()}</div>
        <div style="font-size:.68rem;color:var(--slate);text-transform:uppercase">${a._d.toLocaleString('default',{month:'short'})}</div>
        <div style="font-size:.68rem;color:var(--muted)">${a._d.getFullYear()}</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="badge ${tc[a.type]||'b-slate'}">${a.type}</span>
          <strong style="font-size:.88rem">${a.label}</strong>${countdown}
        </div>
        <div style="font-size:.8rem;color:var(--slate)">Provider: ${a.provider}</div>
        <div style="margin-top:4px">${sbadge(a.status)}</div>
      </div></div>`;
  }
  return `<div class="sec-title">📆 Upcoming Appointments</div>
    <p class="sec-sub">Auto-pulled from PCP Visits, Specialist, and Referral tabs.</p>
    <h3 style="font-family:Lora,serif;color:var(--navy);font-size:.95rem;margin-bottom:12px">Upcoming & Scheduled</h3>
    ${upcoming.length?upcoming.map(a=>apptCard(a,false)).join(''):`<div class="card" style="padding:20px;text-align:center;color:var(--muted)">No upcoming appointments. Add dates in other tabs.</div>`}
    <h3 style="font-family:Lora,serif;color:var(--navy);font-size:.95rem;margin:20px 0 12px">Recent Past (Last 5)</h3>
    ${past.length?past.map(a=>apptCard(a,true)).join(''):`<p style="color:var(--muted);font-size:.85rem">No recent past appointments.</p>`}`;
}

/* ══ LABS ══ */
function rLabs(){
  const groups={};
  S.labs.forEach((l,i)=>{const key=l.test.toLowerCase().trim();if(!groups[key])groups[key]={name:l.test,entries:[]};groups[key].entries.push({...l,i});});
  const groupCards=Object.values(groups).map(g=>{
    const sorted=g.entries.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
    const latest=sorted[0];
    let fc='b-green';if(latest.flag==='High'||latest.flag==='Critical')fc='b-rose';else if(latest.flag==='Low'||latest.flag==='Borderline')fc='b-amber';
    return `<div class="card" style="margin-bottom:12px"><div style="padding:13px 14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:7px">
        <div><div style="font-family:Lora,serif;font-weight:600;color:var(--navy)">${g.name}</div>
        <div style="font-size:.8rem;color:var(--slate)">Latest: ${latest.date} · ${latest.provider||'—'}</div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="text-align:right"><div style="font-family:Lora,serif;font-size:1.3rem;font-weight:600;color:var(--navy)">${latest.value}<small style="font-size:.72rem;font-weight:400"> ${latest.unit||''}</small></div>
          <div style="font-size:.72rem;color:var(--muted)">Ref: ${latest.refRange||'—'}</div></div>
          <span class="badge ${fc}">${latest.flag||'Normal'}</span>
          <button class="del-btn" onclick="delLab(${latest.i})">🗑</button>
        </div>
      </div>
    </div></div>`;
  });
  return `<div class="sec-title">🔬 Lab Results</div><p class="sec-sub">Log and track lab values over time.</p>
    <div class="g2"><div><h3 style="font-family:Lora,serif;color:var(--navy);font-size:.95rem;margin-bottom:12px">My Lab Results</h3>
      ${groupCards.length?groupCards.join(''):`<p style="color:var(--muted);padding:12px 0">No lab results logged yet.</p>`}
    </div>
    <div><div class="card" style="padding:16px">
      <h3 style="font-family:Lora,serif;color:var(--navy);margin-bottom:12px">Add Lab Result</h3>
      <div class="if-wrap">
        <div class="form-group"><label>Test Name</label><input id="lb_t" placeholder="e.g., HbA1c, Cholesterol" /></div>
        <div class="form-group"><label>Result Value</label><input id="lb_v" placeholder="e.g., 5.8" /></div>
        <div class="form-group"><label>Unit (optional)</label><input id="lb_u" placeholder="e.g., %, mg/dL" /></div>
        <div class="form-group"><label>Reference Range</label><input id="lb_r" placeholder="e.g., &lt;5.7%" /></div>
        <div class="form-group"><label>Flag</label><select id="lb_f"><option>Normal</option><option>Borderline</option><option>Low</option><option>High</option><option>Critical</option></select></div>
        <div class="form-group"><label>Date Drawn</label><input id="lb_d" type="date" /></div>
        <div class="form-group"><label>Provider / Lab</label><input id="lb_p" placeholder="e.g., Dr. Smith" /></div>
        <div class="form-group"><label>Notes</label><textarea id="lb_n" placeholder="e.g., Fasting specimen…"></textarea></div>
        <button class="btn btn-p" style="width:100%;justify-content:center" onclick="addLab()">Add Lab Result</button>
      </div>
    </div></div></div>`;
}
window.addLab=()=>{const t=gv('lb_t'),v=gv('lb_v');if(!t||!v){alert('Please enter a test name and result.');return;}S.labs.push({id:uid(),test:t,value:v,unit:gv('lb_u'),refRange:gv('lb_r'),flag:gv('lb_f'),date:gv('lb_d'),provider:gv('lb_p'),notes:gtv('lb_n').trim()});save('labs',S.labs);render();};
window.delLab=(i)=>{S.labs.splice(i,1);save('labs',S.labs);render()};

/* ══ VACCINES ══ */
function rVax(){
  const logged=S.vaccines.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const cards=logged.map((v,i)=>`<div class="rfc"><div class="rfi">💉</div>
    <div style="flex:1;min-width:0"><div><strong>${v.name}</strong>${v.dose?` · ${v.dose}`:''}</div>
    <div style="font-size:.8rem;color:var(--slate)">Date: ${v.date||'—'} · ${v.provider||'—'}</div>
    ${v.nextDue?`<div style="font-size:.77rem;color:var(--amber);font-weight:500">Next due: ${v.nextDue}</div>`:''}</div>
    <button class="del-btn" onclick="delVax(${i})">🗑</button></div>`).join('')||`<p style="color:var(--muted);padding:12px 0">No vaccines logged yet.</p>`;
  const schedule=[{vax:'Influenza (Flu)',freq:'Annually',badge:'b-green'},{vax:'COVID-19',freq:'As updated',badge:'b-green'},{vax:'Tdap / Td',freq:'Every 10 yrs',badge:'b-green'},{vax:'Pneumococcal',freq:'Once (65+)',badge:'b-amber'},{vax:'Shingles (Shingrix)',freq:'2-dose (50+)',badge:'b-amber'},{vax:'RSV',freq:'Once (60+)',badge:'b-amber'},{vax:'Hepatitis B',freq:'3-dose series',badge:'b-slate'},{vax:'Hepatitis A',freq:'2-dose series',badge:'b-slate'},{vax:'HPV',freq:'Through age 26',badge:'b-slate'}];
  return `<div class="sec-title">💉 Vaccines & Immunizations</div><p class="sec-sub">Log your vaccination history and reference the adult schedule.</p>
    <div class="g2"><div><h3 style="font-family:Lora,serif;color:var(--navy);font-size:.95rem;margin-bottom:12px">My Vaccination Record</h3>${cards}</div>
    <div>
      <div class="card" style="padding:16px;margin-bottom:12px">
        <h3 style="font-family:Lora,serif;color:var(--navy);margin-bottom:12px">Log a Vaccine</h3>
        <div class="if-wrap">
          <div class="form-group"><label>Vaccine Name</label><input id="vx_n" placeholder="e.g., Influenza, Shingrix" /></div>
          <div class="form-group"><label>Dose / Series</label><input id="vx_ds" placeholder="e.g., Annual, Dose 1 of 2" /></div>
          <div class="form-group"><label>Date Given</label><input id="vx_d" type="date" /></div>
          <div class="form-group"><label>Given By / Location</label><input id="vx_p" placeholder="e.g., Dr. Smith, CVS" /></div>
          <div class="form-group"><label>Next Dose Due (optional)</label><input id="vx_nd" type="date" /></div>
          <button class="btn btn-p" style="width:100%;justify-content:center" onclick="addVax()">Log Vaccine</button>
        </div>
      </div>
      <div class="scr-ref"><h4>💉 Adult Immunization Schedule</h4>
        ${schedule.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">
          <span class="badge ${s.badge}" style="white-space:nowrap;flex-shrink:0">${s.freq}</span>
          <div style="font-size:.82rem;font-weight:600;color:var(--navy)">${s.vax}</div></div>`).join('')}
        <p style="font-size:.7rem;color:var(--muted);font-style:italic">Discuss your individual schedule with your provider.</p>
      </div>
    </div></div>`;
}
window.addVax=()=>{const n=gv('vx_n'),d=gv('vx_d');if(!n||!d){alert('Please enter a vaccine name and date.');return;}S.vaccines.push({id:uid(),name:n,dose:gv('vx_ds'),date:d,provider:gv('vx_p'),nextDue:gv('vx_nd')});save('vaccines',S.vaccines);render();};
window.delVax=(i)=>{S.vaccines.splice(i,1);save('vaccines',S.vaccines);render()};

function toast(msg){const t=document.createElement('div');t.innerHTML=msg;Object.assign(t.style,{position:'fixed',bottom:'20px',right:'16px',background:'var(--navy)',color:'#fff',padding:'11px 16px',borderRadius:'8px',fontFamily:'DM Sans,sans-serif',fontSize:'.84rem',zIndex:9999,boxShadow:'0 4px 16px rgba(0,0,0,.2)',maxWidth:'280px'});document.body.appendChild(t);setTimeout(()=>t.remove(),3200);}

buildNav();
render();
</script>
</body>
</html>
